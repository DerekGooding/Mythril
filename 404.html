<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Mythril.Blazor</title>
    <script type="text/javascript">
        // Single Page Apps for GitHub Pages
        // https://github.com/rafrex/spa-github-pages
        // This script checks to see if a redirect is present in the query string
        // and converts it back into the correct url and adds it to the
        // browser's history using window.history.replaceState(...),
        // which will cause the window load event to fire
        (function(l) {
            if (l.search) {
                var q = {};
                l.search.slice(1).split('&').forEach(function(v) {
                    var a = v.split('=');
                    q[a[0]] = a.slice(1).join('=').replace(/~and~/g, '&');
                });
                if (q.p !== undefined) {
                    window.history.replaceState(null, null,
                        l.pathname.slice(0, -1) + (q.p || '') +
                        (q.q ? ('?' + q.q) : '') +
                        l.hash
                    );
                }
            }
        }(window.location))
    </script>
    <script type="text/javascript">
        // Dynamic base href for GitHub Pages
        var path = window.location.pathname.split('/');
        var base = '/' + path[1] + '/';
        if (window.location.host.indexOf('localhost') > -1 || window.location.host.indexOf('127.0.0.1') > -1) {
            base = '/';
        }
        document.write('<base href="' + base + '" />');
    </script>
    <link rel="stylesheet" href="lib/bootstrap/dist/css/bootstrap.min.css" />
    <link rel="stylesheet" href="css/app.css" />
    <link rel="stylesheet" href="css/completion-effects.css" />
    <link rel="icon" type="image/png" href="favicon.png" />
    <link id="theme" rel="stylesheet" href="css/dark-theme.css" />
    <link href="Mythril.Blazor.styles.css" rel="stylesheet" />
    <link href="https://fonts.googleapis.com/icon?family=Material+Icons" rel="stylesheet">
    <link href="https://fonts.googleapis.com/icon?family=Material+Icons+Outlined" rel="stylesheet">
    <link href="https://fonts.googleapis.com/icon?family=Material+Icons+Round" rel="stylesheet">
    <link href="https://fonts.googleapis.com/icon?family=Material+Icons+Sharp" rel="stylesheet">
</head>

<body>
    <div id="app">
        <svg class="loading-progress">
            <circle r="40%" cx="50%" cy="50%" />
            <circle r="40%" cx="50%" cy="50%" />
        </svg>
        <div class="loading-progress-text"></div>
    </div>

    <div id="blazor-error-ui">
        An unhandled error has occurred.
        <a href="." class="reload">Reload</a>
        <span class="dismiss">🗙</span>
    </div>

    <script src="_framework/blazor.webassembly.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>
    <script>
        // Global utility functions for Blazor JS Interop

        window.setTheme = function (theme) {
            console.log("JS: setTheme called with: " + theme);
            var link = document.getElementById('theme');
            if (link) {
                link.setAttribute('href', 'css/' + theme + '.css');
            } else {
                console.error("JS: Theme link element (#theme) not found.");
            }
            localStorage.setItem('theme', theme);
        };

        window.triggerConfettiAt = function(element) {
            if (typeof confetti === 'function') {
                var rect = element.getBoundingClientRect();
                confetti({
                    particleCount: 40,
                    spread: 50,
                    origin: {
                        x: (rect.left + rect.right) / 2 / window.innerWidth,
                        y: (rect.top + rect.bottom) / 2 / window.innerHeight
                    }
                });
            }
        };

        window.getRecentLogs = function() { return "Logs not available in release mode."; };

        // For automated theme verification
        window.getVisualSnapshot = function() {
            const body = window.getComputedStyle(document.body);
            const card = document.querySelector('.character-display') ? window.getComputedStyle(document.querySelector('.character-display')) : null;
            const party = document.querySelector('.party-panel') ? window.getComputedStyle(document.querySelector('.party-panel')) : null;
            const progressBar = document.querySelector('.progress-bar') ? window.getComputedStyle(document.querySelector('.progress-bar')) : null;

            return {
                bodyBg: body.backgroundColor,
                bodyText: body.color,
                cardBg: card ? card.backgroundColor : 'N/A',
                partyBg: party ? party.backgroundColor : 'N/A',
                progressBg: progressBar ? progressBar.backgroundColor : 'N/A',
                progressWidth: progressBar ? progressBar.width : 'N/A',
                themeHref: document.getElementById('theme').getAttribute('href')
            };
        };

        // Run initial theme sync
        (function() {
            var savedTheme = localStorage.getItem('theme') || 'dark-theme';
            window.setTheme(savedTheme);
        })();
    </script>
</body>
</html>
