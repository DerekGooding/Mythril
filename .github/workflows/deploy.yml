name: Deploy Blazor to GitHub Pages

on:
  workflow_dispatch:
  push:
    branches:
      - main

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    permissions:
      contents: write

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4
        with:
          fetch-depth: 0 # Needed for staleness check (git history)

      - name: Setup .NET
        uses: actions/setup-dotnet@v3
        with:
          dotnet-version: '10.0.x'

      - name: Setup Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.x'

      - name: Restore dependencies
        run: dotnet restore Mythril.Blazor/Mythril.Blazor.csproj

      - name: Health Check & Tests
        id: health_check
        continue-on-error: true
        run: |
          python scripts/check_health.py

      - name: Commit Health Data
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action"
          git add scripts/data/*.json
          git commit -m "chore: update health metrics and shields [skip ci]" || echo "No changes to commit"
          git push origin main
        continue-on-error: true

      - name: Build Blazor App
        if: always()
        run: |
          dotnet publish Mythril.Blazor/Mythril.Blazor.csproj -c Release -o output
          echo "{\"version\": \"${{ github.sha }}\", \"timestamp\": \"$(date -u +'%Y-%m-%dT%H:%M:%SZ')\"}" > output/wwwroot/version.json

      - name: Deploy to GitHub Pages
        if: always()
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./output/wwwroot
